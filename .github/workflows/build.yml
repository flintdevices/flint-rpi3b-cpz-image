name: Build flint RPi 3B+ image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      flint_deb_url:
        description: "flint .deb URL (leave blank for latest)"
        required: false
        default: ""

jobs:
  build:
    # ARM runner: executes arm64 binaries natively — no qemu emulation needed
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin grep rsync \
            xz-utils file git curl bc gpg pigz xxd arch-test \
            qemu-user-static kmod binfmt-support e2fsprogs \
            device-tree-compiler

      - name: Compile DTS overlay
        run: |
          dtc -@ -I dts -O dtb \
            -o overlays/rpi3b-flint-overlay.dtbo \
            overlays/rpi3b-flint-overlay.dts

      - name: Determine flint .deb URL
        id: deb_url
        run: |
          URL="${{ github.event.inputs.flint_deb_url }}"
          if [ -z "${URL}" ]; then
            URL="https://releases.flintdevices.dev/flint_latest_arm64.deb"
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Copy custom stage into pi-gen
        run: cp -r stage-flint pi-gen/stage-flint

      - name: Skip fork's private CPZero app installers
        # stage2/05-cardputerzero/03-run.sh pulls Recorder/CameraApp/FactoryTest/
        # Compass from private CardputerZero repos (needs APP_RELEASES_TOKEN we
        # don't have, and irrelevant on RPi 3B+). pi-gen skips non-executable
        # run scripts, so drop the +x bit. APPLaunch (02-run.sh) stays — flint
        # registers itself with it via the deb postinst.
        run: chmod -x pi-gen/stage2/05-cardputerzero/03-run.sh

      - name: Write pi-gen config
        run: |
          IMG_DATE=$(date +%Y-%m-%d)
          cat > pi-gen/config << EOF
          IMG_NAME=flint-rpi3b-cpz
          IMG_FILENAME=${IMG_DATE}-flint-rpi3b-cpz
          ARCHIVE_FILENAME=${IMG_DATE}-flint-rpi3b-cpz
          RELEASE=trixie
          DEPLOY_COMPRESSION=xz
          DEPLOY_ZIP=0
          TARGET_HOSTNAME=flint
          FIRST_USER_NAME=flint
          FIRST_USER_PASS=flint
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_GB.UTF-8
          TIMEZONE_DEFAULT=UTC
          KEYBOARD_KEYMAP=gb
          KEYBOARD_LAYOUT="English (UK)"
          STAGE_LIST="stage0 stage1 stage2 stage-flint"
          FLINT_DEB_URL=${{ steps.deb_url.outputs.url }}
          EOF
          sed -i 's/^          //' pi-gen/config
          # Skip the desktop stages we don't use (our flint image branches off stage2 Lite)
          touch pi-gen/stage3/SKIP pi-gen/stage3/SKIP_IMAGES || true
          touch pi-gen/stage4/SKIP pi-gen/stage4/SKIP_IMAGES || true
          touch pi-gen/stage5/SKIP pi-gen/stage5/SKIP_IMAGES || true

      - name: Build image
        run: |
          cd pi-gen
          sudo XZ_DEFAULTS="-T0" ./build.sh
        env:
          FLINT_DEB_URL: ${{ steps.deb_url.outputs.url }}

      - name: Collect image artifact
        id: artifact
        run: |
          sudo chown -R "$(id -u):$(id -g)" pi-gen/deploy/
          echo "Contents of deploy/:"
          find pi-gen/deploy/ -type f | sort
          # stage2 exports a -lite image (no flint); stage-flint exports ours (no suffix)
          IMG=$(find pi-gen/deploy/ -type f -name "*.img.xz" ! -name "*-lite*" | head -1)
          if [ -z "${IMG}" ]; then
            echo "ERROR: no flint image found in deploy/"
            exit 1
          fi
          echo "path=${IMG}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${IMG})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "flint RPi 3B+ image ${{ github.ref_name }}"
          body: |
            ## flint CardputerZero image for Raspberry Pi 3B+

            Flash to a MicroSD card with Raspberry Pi Imager or `dd`.

            ```bash
            xz -d ${{ steps.artifact.outputs.name }}
            sudo dd if=${{ steps.artifact.outputs.name }} of=/dev/sdX bs=4M status=progress conv=fsync
            ```

            ### First boot
            1. Edit `bootfs/wifi.txt` with your Wi-Fi credentials before ejecting the card.
            2. SSH: `ssh flint@flint.local` (password: `flint`)
            3. flint starts automatically on the ST7789V display.

            ### Hardware wiring
            See the [wiring guide](https://github.com/${{ github.repository }}/blob/main/docs/cardputer/rpi3bplus-dev-setup.md).

            Built from flint: `${{ steps.deb_url.outputs.url }}`
          files: ${{ steps.artifact.outputs.path }}
          draft: false
          prerelease: false

      - name: Upload artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 7

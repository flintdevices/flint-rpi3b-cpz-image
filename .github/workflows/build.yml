name: Build flint RPi 3B+ image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      flint_deb_url:
        description: "flint .deb URL (leave blank for latest)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler qemu-user qemu-user-static binfmt-support

      - name: Register qemu-aarch64 binfmt (kernel-level, persistent for containers)
        run: |
          # This registers qemu-aarch64-static with the F (fix-binary) flag so
          # Docker containers can transparently execute arm64 ELF binaries.
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes --credential yes
          # Verify registration landed in the kernel
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 | grep "flags:" || true

      - name: Compile DTS overlay
        run: |
          dtc -@ -I dts -O dtb \
            -o overlays/rpi3b-flint-overlay.dtbo \
            overlays/rpi3b-flint-overlay.dts

      - name: Determine flint .deb URL
        id: deb_url
        run: |
          URL="${{ github.event.inputs.flint_deb_url }}"
          if [ -z "${URL}" ]; then
            URL="https://releases.flintdevices.dev/flint_latest_arm64.deb"
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Link custom stages into pi-gen
        run: |
          ln -sf "${GITHUB_WORKSPACE}/stage0b"     pi-gen/stage0b
          ln -sf "${GITHUB_WORKSPACE}/stage-flint" pi-gen/stage-flint

      - name: Build image (pi-gen Docker)
        env:
          FLINT_DEB_URL: ${{ steps.deb_url.outputs.url }}
        run: |
          cd pi-gen
          ./build-docker.sh -c "${GITHUB_WORKSPACE}/config"

      - name: Collect image artifact
        id: artifact
        run: |
          IMG=$(ls pi-gen/deploy/*.img.xz | head -1)
          echo "path=${IMG}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${IMG})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "flint RPi 3B+ image ${{ github.ref_name }}"
          body: |
            ## flint CardputerZero image for Raspberry Pi 3B+

            Flash to a MicroSD card with Raspberry Pi Imager or `dd`.

            ```bash
            xz -d ${{ steps.artifact.outputs.name }}
            sudo dd if=${{ steps.artifact.outputs.name }} of=/dev/sdX bs=4M status=progress conv=fsync
            ```

            ### First boot
            1. Edit `bootfs/wifi.txt` with your Wi-Fi credentials before ejecting the card.
            2. SSH: `ssh flint@flint.local` (password: `flint`)
            3. flint starts automatically on the ST7789V display.

            ### Hardware wiring
            See [docs/cardputer/rpi3bplus-dev-setup.md](https://github.com/${{ github.repository }}/blob/main/docs/cardputer/rpi3bplus-dev-setup.md) for full wiring table.

            Built from flint: `${{ steps.deb_url.outputs.url }}`
          files: ${{ steps.artifact.outputs.path }}
          draft: false
          prerelease: false

      - name: Upload artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 7
